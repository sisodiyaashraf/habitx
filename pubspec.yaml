name: habitx
description: "A professional gamified habit tracker built with Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  fl_chart: ^1.1.1
  flutter_local_notifications: ^21.0.0
  glassmorphism: ^3.0.0
  intl: ^0.20.2
  timezone: ^0.11.0
  font_awesome_flutter: ^11.0.0
  simple_heatmap_calendar: ^0.4.0
  url_launcher: ^6.3.2
  in_app_review: ^2.0.11
  share_plus: ^12.0.1
  flutter_timezone: ^5.0.2
  notification_master: ^0.0.5
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Moved launcher icons to dev_dependencies as they are only needed for building
  flutter_launcher_icons: ^0.14.4

# Professional Icon Configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon1.png"
  adaptive_icon_background: "#121212" # Matches your Dark Mode background


flutter:
  uses-material-design: true

  # Ensure you create these folders in your project root
  assets:
    - assets/images/